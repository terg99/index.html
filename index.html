<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TallyUp">
<title>TallyUp</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3f;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --accent3: #6affb4;
    --text: #f0f0f8;
    --text2: #8888aa;
    --danger: #ff4466;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .nav-logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
  .nav-logo span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; }
  .nav-tab {
    padding: 7px 16px; border-radius: 7px; border: none; background: transparent;
    color: var(--text2); font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-tab.active { background: var(--accent); color: #fff; }
  .nav-edit-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .nav-edit-btn:hover { background: var(--accent); border-color: var(--accent); }

  /* ── VIEWS ── */
  .view { display: none; padding: 20px; }
  .view.active { display: block; }

  /* ── COUNTER GRID ── */
  .counter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px 16px;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; cursor: pointer; position: relative;
    transition: transform 0.12s, box-shadow 0.12s;
    user-select: none;
    min-height: 160px;
    overflow: hidden;
  }
  .tile::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--tile-color, var(--accent));
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .tile:active { transform: scale(0.95); box-shadow: 0 0 20px -5px var(--tile-color, var(--accent)); }
  .tile-name {
    font-size: 0.85rem; font-weight: 600; color: var(--text2);
    text-align: center; text-transform: uppercase; letter-spacing: 1px;
    word-break: break-word;
  }
  .tile-count {
    font-family: 'Space Mono', monospace;
    font-size: 2.6rem; font-weight: 700;
    color: var(--text); line-height: 1;
  }
  .tile-btn-row { display: flex; gap: 8px; align-items: center; }
  .tile-minus, .tile-plus {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .tile-minus:active { background: var(--danger); border-color: var(--danger); }
  .tile-plus {
    width: 44px; height: 44px; font-size: 1.5rem;
    background: var(--tile-color, var(--accent));
    border-color: transparent; color: #fff;
  }
  .tile-plus:active { filter: brightness(0.8); }
  .tile-today { font-size: 0.72rem; color: var(--text2); font-family: 'Space Mono', monospace; }

  /* Ripple */
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }
  .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15); width: 60px; height: 60px; transform: scale(0); animation: ripple 0.4s linear; pointer-events: none; }

  /* ── ADD TILE BUTTON ── */
  .add-tile-btn {
    background: transparent; border: 2px dashed var(--border);
    border-radius: var(--radius); padding: 20px 16px;
    min-height: 160px; cursor: pointer;
    color: var(--text2); font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
  }
  .add-tile-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-tile-btn .plus-icon { font-size: 2rem; }

  /* ── DASHBOARD ── */
  .dash-header { margin-bottom: 20px; }
  .dash-title { font-size: 1.5rem; font-weight: 800; }
  .dash-sub { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }
  .stats-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 1.8rem; font-weight: 700; margin-top: 6px; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.accent2 { color: var(--accent2); }

  .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
  .bar-list { display: flex; flex-direction: column; gap: 10px; }
  .bar-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .bar-name { font-weight: 600; font-size: 0.9rem; }
  .bar-count { font-family: 'Space Mono', monospace; font-size: 0.9rem; color: var(--text2); }
  .bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  .today-section { margin-top: 24px; }
  .today-list { display: flex; flex-direction: column; gap: 8px; }
  .today-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .today-name { font-weight: 600; font-size: 0.9rem; }
  .today-badge {
    font-family: 'Space Mono', monospace; font-size: 0.8rem;
    padding: 3px 10px; border-radius: 20px; background: var(--surface2);
    color: var(--accent);
  }
  .reset-section { margin-top: 24px; text-align: center; }
  .reset-btn {
    background: transparent; border: 1px solid var(--danger);
    color: var(--danger); padding: 10px 24px; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { background: var(--danger); color: #fff; }

  /* ── EDIT VIEW ── */
  .edit-section-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 16px; }
  .tile-edit-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .tile-edit-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .color-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  }
  .tile-edit-name {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; outline: none;
    min-width: 0;
  }
  .tile-edit-name:focus { border-bottom: 1px solid var(--accent); }
  .color-picker { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; overflow: hidden; padding: 0; background: none; }
  .delete-tile-btn {
    background: transparent; border: none; color: var(--text2);
    font-size: 1.2rem; cursor: pointer; padding: 4px; transition: color 0.2s;
  }
  .delete-tile-btn:hover { color: var(--danger); }
  .add-new-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent); border: none; color: #fff;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: filter 0.2s;
  }
  .add-new-btn:hover { filter: brightness(1.1); }
  .save-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent3); border: none; color: #0f0f14;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-top: 12px; transition: filter 0.2s;
  }
  .save-btn:hover { filter: brightness(0.9); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 200; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px; width: 100%; max-width: 480px;
    border: 1px solid var(--border);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 1rem;
    outline: none; margin-bottom: 16px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-colors { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .modal-color-opt {
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: border-color 0.15s;
  }
  .modal-color-opt.selected { border-color: #fff; }
  .modal-confirm {
    width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent); border: none; color: #fff;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer;
  }
  .modal-cancel {
    width: 100%; padding: 12px; border-radius: 12px;
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; margin-top: 8px;
  }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-title { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 0.9rem; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 30px;
    font-size: 0.85rem; font-weight: 600; z-index: 300;
    transition: transform 0.3s ease; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Tally<span>Up</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('counters')">Tiles</button>
    <button class="nav-tab" onclick="showView('dashboard')">Stats</button>
  </div>
  <button class="nav-edit-btn" onclick="showView('edit')">✏️ Edit</button>
</nav>

<!-- COUNTERS VIEW -->
<div class="view active" id="view-counters">
  <div class="counter-grid" id="counter-grid"></div>
</div>

<!-- DASHBOARD VIEW -->
<div class="view" id="view-dashboard">
  <div class="dash-header">
    <div class="dash-title">Your Stats</div>
    <div class="dash-sub" id="dash-date"></div>
  </div>
  <div class="stats-cards">
    <div class="stat-card">
      <div class="stat-label">Total All Time</div>
      <div class="stat-value accent" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value accent2" id="stat-today">0</div>
    </div>
  </div>
  <div class="section-title">All Time Totals</div>
  <div class="bar-list" id="bar-list"></div>
  <div class="today-section">
    <div class="section-title">Today's Activity</div>
    <div class="today-list" id="today-list"></div>
  </div>
  <div class="reset-section">
    <button class="reset-btn" onclick="confirmReset()">🗑 Reset All Counters</button>
  </div>
</div>

<!-- EDIT VIEW -->
<div class="view" id="view-edit">
  <div class="edit-section-title">Manage Your Tiles</div>
  <div class="tile-edit-list" id="tile-edit-list"></div>
  <button class="add-new-btn" onclick="openAddModal()">+ Add New Tile</button>
  <button class="save-btn" onclick="saveEdit()">✓ Save Changes</button>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">New Tile</div>
    <input class="modal-input" id="modal-name" placeholder="Tile name (e.g. Water, Coffee...)" maxlength="20">
    <div class="modal-colors" id="modal-colors"></div>
    <button class="modal-confirm" onclick="confirmAddTile()">Add Tile</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#7c6aff','#ff6a8a','#6affb4','#ffb86a','#6aaeff','#ff6af2','#fff06a','#ff8c6a'];
const TODAY = new Date().toISOString().split('T')[0];

let state = load();
let selectedModalColor = COLORS[0];

function load() {
  try {
    const s = JSON.parse(localStorage.getItem('tallyup_v2'));
    if (s && s.tiles) return s;
  } catch(e) {}
  return {
    tiles: [
      { id: 1, name: 'Water', color: '#6aaeff', count: 0, todayCounts: {} },
      { id: 2, name: 'Coffee', color: '#ffb86a', count: 0, todayCounts: {} },
      { id: 3, name: 'Exercise', color: '#6affb4', count: 0, todayCounts: {} },
    ]
  };
}

function save() {
  localStorage.setItem('tallyup_v2', JSON.stringify(state));
}

function getTodayCount(tile) {
  return (tile.todayCounts && tile.todayCounts[TODAY]) || 0;
}

// ── COUNTERS ──
function renderCounters() {
  const grid = document.getElementById('counter-grid');
  grid.innerHTML = '';
  if (!state.tiles.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🎯</div>
      <div class="empty-title">No tiles yet</div>
      <div class="empty-sub">Tap ✏️ Edit to add your first tile</div>
    </div>`;
    return;
  }
  state.tiles.forEach(tile => {
    const div = document.createElement('div');
    div.className = 'tile';
    div.style.setProperty('--tile-color', tile.color);
    div.innerHTML = `
      <div class="tile-name">${escHtml(tile.name)}</div>
      <div class="tile-count" id="count-${tile.id}">${tile.count}</div>
      <div class="tile-btn-row">
        <button class="tile-minus" onclick="adjust(event,${tile.id},-1)">−</button>
        <button class="tile-plus" onclick="increment(event,${tile.id})">+</button>
      </div>
      <div class="tile-today" id="today-${tile.id}">Today: ${getTodayCount(tile)}</div>
    `;
    grid.appendChild(div);
  });
}

function increment(e, id) {
  e.stopPropagation();
  const tile = state.tiles.find(t => t.id === id);
  if (!tile) return;
  tile.count++;
  tile.todayCounts = tile.todayCounts || {};
  tile.todayCounts[TODAY] = (tile.todayCounts[TODAY] || 0) + 1;
  save();
  const countEl = document.getElementById('count-' + id);
  const todayEl = document.getElementById('today-' + id);
  if (countEl) { countEl.textContent = tile.count; countEl.style.transform = 'scale(1.3)'; setTimeout(() => countEl.style.transform = '', 120); }
  if (todayEl) todayEl.textContent = 'Today: ' + getTodayCount(tile);
  // Ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  r.style.left = (e.clientX - rect.left - 30) + 'px';
  r.style.top = (e.clientY - rect.top - 30) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 400);
}

function adjust(e, id, delta) {
  e.stopPropagation();
  const tile = state.tiles.find(t => t.id === id);
  if (!tile) return;
  tile.count = Math.max(0, tile.count + delta);
  if (delta < 0 && tile.todayCounts && tile.todayCounts[TODAY] > 0) {
    tile.todayCounts[TODAY] = Math.max(0, tile.todayCounts[TODAY] + delta);
  }
  save();
  const countEl = document.getElementById('count-' + id);
  const todayEl = document.getElementById('today-' + id);
  if (countEl) countEl.textContent = tile.count;
  if (todayEl) todayEl.textContent = 'Today: ' + getTodayCount(tile);
}

// ── DASHBOARD ──
function renderDashboard() {
  const now = new Date();
  document.getElementById('dash-date').textContent = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const total = state.tiles.reduce((s, t) => s + t.count, 0);
  const todayTotal = state.tiles.reduce((s, t) => s + getTodayCount(t), 0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-today').textContent = todayTotal;

  const maxCount = Math.max(1, ...state.tiles.map(t => t.count));
  const barList = document.getElementById('bar-list');
  barList.innerHTML = '';
  [...state.tiles].sort((a, b) => b.count - a.count).forEach(tile => {
    const pct = Math.round((tile.count / maxCount) * 100);
    barList.innerHTML += `
      <div class="bar-item">
        <div class="bar-top">
          <div class="bar-name">${escHtml(tile.name)}</div>
          <div class="bar-count">${tile.count}</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${tile.color}"></div></div>
      </div>`;
  });

  const todayList = document.getElementById('today-list');
  todayList.innerHTML = '';
  const active = state.tiles.filter(t => getTodayCount(t) > 0);
  if (!active.length) {
    todayList.innerHTML = `<div style="color:var(--text2);text-align:center;padding:20px 0;font-size:0.9rem">No activity today yet — get tapping! 🎯</div>`;
  } else {
    active.sort((a,b) => getTodayCount(b) - getTodayCount(a)).forEach(tile => {
      todayList.innerHTML += `
        <div class="today-row">
          <div class="today-name">${escHtml(tile.name)}</div>
          <div class="today-badge" style="color:${tile.color}">${getTodayCount(tile)} today</div>
        </div>`;
    });
  }
}

function confirmReset() {
  if (confirm('Reset ALL counters to 0? This cannot be undone.')) {
    state.tiles.forEach(t => { t.count = 0; t.todayCounts = {}; });
    save();
    renderCounters();
    renderDashboard();
    toast('All counters reset');
  }
}

// ── EDIT ──
function renderEdit() {
  const list = document.getElementById('tile-edit-list');
  list.innerHTML = '';
  state.tiles.forEach((tile, i) => {
    const row = document.createElement('div');
    row.className = 'tile-edit-row';
    row.innerHTML = `
      <div class="color-dot" style="background:${tile.color}"></div>
      <input class="tile-edit-name" value="${escHtml(tile.name)}" data-id="${tile.id}" maxlength="20" placeholder="Tile name">
      <button class="delete-tile-btn" onclick="deleteTile(${tile.id})">🗑</button>
    `;
    list.appendChild(row);
  });
}

function deleteTile(id) {
  if (state.tiles.length <= 1) { toast('Keep at least 1 tile'); return; }
  if (confirm('Delete this tile? Its count will be lost.')) {
    state.tiles = state.tiles.filter(t => t.id !== id);
    save(); renderEdit(); toast('Tile deleted');
  }
}

function saveEdit() {
  const inputs = document.querySelectorAll('.tile-edit-name');
  inputs.forEach(inp => {
    const id = parseInt(inp.dataset.id);
    const tile = state.tiles.find(t => t.id === id);
    if (tile && inp.value.trim()) tile.name = inp.value.trim();
  });
  save();
  renderCounters();
  toast('Changes saved ✓');
  showView('counters');
}

// ── MODAL ──
function openAddModal() {
  document.getElementById('modal-name').value = '';
  selectedModalColor = COLORS[0];
  const colorWrap = document.getElementById('modal-colors');
  colorWrap.innerHTML = '';
  COLORS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'modal-color-opt' + (i === 0 ? ' selected' : '');
    btn.style.background = c;
    btn.onclick = () => {
      selectedModalColor = c;
      document.querySelectorAll('.modal-color-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    colorWrap.appendChild(btn);
  });
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 300);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function confirmAddTile() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { toast('Please enter a name'); return; }
  const newId = Date.now();
  state.tiles.push({ id: newId, name, color: selectedModalColor, count: 0, todayCounts: {} });
  save();
  closeModal();
  renderEdit();
  toast('Tile added ✓');
}

// ── VIEWS ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(name === 'counters' ? 'tile' : name)) t.classList.add('active');
  });
  if (name === 'dashboard') renderDashboard();
  if (name === 'edit') renderEdit();
  if (name === 'counters') renderCounters();
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
renderCounters();
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
</script>
</body>
</html>
